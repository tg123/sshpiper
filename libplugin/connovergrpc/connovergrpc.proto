syntax = "proto3";

package connovergrpc;

option go_package = "github.com/tg123/sshpiper/libplugin/connovergrpc";

// ConnMessage carries a net.Conn tunneled over a bidirectional gRPC stream.
// The first message in a stream carries an opaque, application-defined request
// describing the connection to create; all subsequent messages in both
// directions carry the tunneled connection bytes. connovergrpc itself does not
// interpret the request bytes - the application owns their format.
message ConnMessage {
  oneof message {
    bytes request = 1;
    bytes data = 2;
  }
}

// ConnOverGrpc tunnels a net.Conn over a bidirectional gRPC stream. It is a
// self-contained, application-agnostic service: the first message of a
// CreateConn stream carries the opaque request and every following message in
// either direction carries the connection bytes. Any program can import this
// package, register a ConnOverGrpcServer, and use the generated client to
// obtain a net.Conn via the helpers in this package.
service ConnOverGrpc {
  rpc CreateConn(stream ConnMessage) returns (stream ConnMessage) {}
}
