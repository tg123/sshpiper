services:
  sshd:
    image: lscr.io/linuxserver/openssh-server:9.9_p1-r2-ls190
    environment:
      - USER_NAME=demo
      - USER_PASSWORD=pass
      - PASSWORD_ACCESS=true
      - LOG_STDOUT=true

  honeypot:
    # cowrie is a medium-interaction SSH honeypot. By default it listens on
    # port 2222 and accepts almost any username/password combination.
    image: cowrie/cowrie:2.5.0

  sshpiper:
    build:
      context: ../..
      target: sshpiperd
      args:
        BUILDTAGS: full
    command:
      - /sshpiperd/plugins/lua
      - --script
      - /examples/routing.lua
    volumes:
      - ./lua/routing.lua:/examples/routing.lua:ro
    ports:
      - "2222:2222"
    depends_on:
      - sshd
      - honeypot
