name: Go Unit Test

on:
  push:
    branches: [ master ]
  pull_request:

permissions:
  contents: read

jobs:

  test-and-lint:
    name: Build
    runs-on: ubuntu-latest
    steps:
    - name: Check out code into the Go module directory
      uses: actions/checkout@v7

    - name: Set up Go 1.26.x
      uses: actions/setup-go@v7
      with:
        go-version: '1.26.x'
        cache: true

    - name: Test sshpiper (root module)
      run: go test -v -race -cover -tags full ./...

    - name: Test sshpiperd daemon module
      run: go test -v -race -cover ./...
      working-directory: cmd/sshpiperd

    - name: golangci-lint (root module)
      uses: golangci/golangci-lint-action@v9
      with:
          args: --timeout=60m --verbose --print-resources-usage --build-tags full -D errcheck
      env:
        GOGC: "10"

    - name: golangci-lint (sshpiperd daemon module)
      uses: golangci/golangci-lint-action@v9
      with:
          args: --timeout=60m --verbose --print-resources-usage -D errcheck
          working-directory: cmd/sshpiperd
      env:
        GOGC: "10"

 
    # test go releaser
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Setup Snap
      run: |
        set -e
        sudo snap install snapcraft --classic --revision 11040
        # https://github.com/goreleaser/goreleaser/pull/2117
        mkdir -p $HOME/.cache/snapcraft/download
        mkdir -p $HOME/.cache/snapcraft/stage-packages   

    - name: Run GoReleaser
      uses: goreleaser/goreleaser-action@v7
      with:
        distribution: goreleaser
        version: latest
        args: release --snapshot --clean
      env:
        SKIP_PUSH: "true"
