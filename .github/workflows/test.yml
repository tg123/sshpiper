name: Go Unit Test

on:
  push:
    branches: [ master ]
  pull_request:

permissions:
  contents: read

jobs:

  test-and-lint:
    name: Build
    runs-on: ubuntu-latest
    steps:
    - name: Check out code into the Go module directory
      uses: actions/checkout@v6
      with:
        submodules: 'recursive'

    - name: Set up Go 1.26.x
      uses: actions/setup-go@v6
      with:
        go-version: '1.26.x'
        cache: true

    - name: Test lib ssh
      run: go test -v -cover ./...
      working-directory: crypto/ssh

    - name: Test sshpiper
      run: go test -v -race -cover -tags full ./...

    - name: golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
          args: --timeout=60m --verbose --print-resources-usage --build-tags full -D errcheck
      env:
        GOGC: "10"

 
    # Smoke-test the release pipeline that replaced goreleaser.
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Setup Snap
      run: |
        set -e
        sudo snap install snapcraft --classic --revision 11040
        mkdir -p $HOME/.cache/snapcraft/download
        mkdir -p $HOME/.cache/snapcraft/stage-packages

    - name: Smoke-test release pipeline
      run: |
        make release VERSION=devel
        make snap VERSION=devel
