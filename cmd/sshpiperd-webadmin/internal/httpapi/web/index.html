<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>sshpiperd admin</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="assets/pico.min.css">
<link rel="stylesheet" href="assets/xterm.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="page">
  <h1>sshpiperd admin</h1>
  <div class="meta" id="meta"></div>
</header>

<section>
  <h2>
    <span>Instances</span>
    <span class="grow"></span>
    <span class="meta" id="instances-meta"></span>
  </h2>
  <table id="instances">
    <thead>
      <tr>
        <th>id</th>
        <th>address</th>
        <th>ssh listen</th>
        <th>version</th>
        <th>started</th>
        <th>status</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</section>

<section>
  <h2>
    <span>Live sessions</span>
    <span class="grow"></span>
    <div class="toolbar">
      <input type="search" id="filter" placeholder="filter (user, addr, instance, id)" autocomplete="off">
      <label><input type="checkbox" id="autorefresh" checked> auto-refresh</label>
      <button id="refresh" class="secondary outline">refresh</button>
    </div>
  </h2>
  <table id="sessions">
    <thead>
      <tr>
        <th class="sortable" data-sort="instance_id">instance</th>
        <th class="sortable" data-sort="id">id</th>
        <th class="sortable sort-desc" data-sort="started_at">since</th>
        <th class="sortable" data-sort="downstream">downstream</th>
        <th class="sortable" data-sort="upstream">upstream</th>
        <th></th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
  <div class="empty" id="empty" style="display:none">No sessions.</div>
  <div class="errors" id="errors"></div>
</section>

<dialog id="viewer">
  <div class="panel">
    <header class="viewer-header">
      <strong id="viewer-title">session</strong>
      <button id="viewer-copy" type="button">copy</button>
      <button id="viewer-close" type="button">close</button>
    </header>
    <div id="viewer-output"></div>
  </div>
</dialog>

<div id="toasts" aria-live="polite" aria-atomic="false"></div>

<script src="assets/xterm.js"></script>
<script src="assets/xterm-addon-fit.js"></script>
<script src="app.js"></script>
</body>
</html>
