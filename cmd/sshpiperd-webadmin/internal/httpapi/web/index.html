<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>sshpiperd admin</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  :root { color-scheme: light dark; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; margin: 1.5em; }
  header { display: flex; align-items: baseline; justify-content: space-between; gap: 1em; }
  header h1 { font-size: 1.3em; margin: 0; }
  header .meta { color: #888; font-size: 0.85em; }
  table { border-collapse: collapse; width: 100%; margin-top: 1em; font-size: 0.9em; }
  th, td { text-align: left; padding: 0.45em 0.6em; border-bottom: 1px solid #ddd; }
  th { background: rgba(127,127,127,0.1); position: sticky; top: 0; }
  tr.kill-disabled td button.kill { display: none; }
  button { font: inherit; padding: 0.25em 0.7em; cursor: pointer; }
  button.kill { color: #b00; }
  .errors { color: #b00; white-space: pre-wrap; font-family: monospace; margin-top: 0.5em; font-size: 0.8em; }
  .empty { color: #888; padding: 2em 0; text-align: center; }
  /* terminal viewer */
  #viewer { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: stretch; justify-content: center; z-index: 9; }
  #viewer.active { display: flex; }
  #viewer .panel { background: #111; color: #eee; margin: 1em; padding: 1em; border-radius: 6px; flex: 1; max-width: 1100px; display: flex; flex-direction: column; }
  #viewer .panel header { color: #eee; }
  #viewer pre { flex: 1; overflow: auto; background: #000; padding: 0.5em; margin: 0.5em 0 0; border-radius: 4px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.85em; line-height: 1.2; white-space: pre-wrap; word-break: break-all; }
  #viewer button.close { background: transparent; border: 1px solid #888; color: #eee; }
</style>
</head>
<body>
<header>
  <h1>sshpiperd admin</h1>
  <div class="meta" id="meta"></div>
</header>

<section>
  <h2 style="font-size:1em;margin:1.2em 0 0.3em">Instances</h2>
  <table id="instances">
    <thead><tr><th>id</th><th>address</th><th>ssh listen</th><th>version</th><th>started</th></tr></thead>
    <tbody></tbody>
  </table>
</section>

<section>
  <h2 style="font-size:1em;margin:1.2em 0 0.3em">Live sessions <button id="refresh">refresh</button></h2>
  <table id="sessions">
    <thead><tr>
      <th>instance</th><th>id</th><th>since</th>
      <th>downstream</th><th>upstream</th>
      <th></th><th></th>
    </tr></thead>
    <tbody></tbody>
  </table>
  <div class="empty" id="empty" style="display:none">No sessions.</div>
  <div class="errors" id="errors"></div>
</section>

<div id="viewer">
  <div class="panel">
    <header>
      <strong id="viewer-title">session</strong>
      <button class="close" id="viewer-close">close</button>
    </header>
    <pre id="viewer-output"></pre>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
