# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# This is an example .goreleaser.yml file with some sensible defaults.
# Make sure to check the documentation at https://goreleaser.com
version: 2
before:
  hooks:
    # You may remove this if you don't use go modules.
    - go mod tidy
    # Build the embedded sshpiperd-webadmin frontend before any go build.
    # Requires Node.js 18+ and npm on the host.
    - npm --prefix cmd/sshpiperd-webadmin/internal/httpapi/web ci
    - npm --prefix cmd/sshpiperd-webadmin/internal/httpapi/web run build
builds:
  - id: sshpiperd
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./cmd/sshpiperd
    binary: sshpiperd
    flags:
      - &trimpath_flag -trimpath
    ldflags:
      - &strip_ldflags -s -w
      - -X main.mainver={{.Version}}
  - id: snaplauncher
    env:
      - CGO_ENABLED=0
    goos:
      - linux      
    main: ./cmd/sshpiperd/snap/launcher
    binary: snap/launcher
    flags:
      - *trimpath_flag
    ldflags:
      - *strip_ldflags
    hooks:
      pre: go generate ./cmd/sshpiperd/snap/launcher
    goarch:
      - amd64
      - arm64      
  - id: plugin_workingdir
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./plugin/workingdir
    binary: plugins/workingdir
    flags:
      - *trimpath_flag
    ldflags:
      - *strip_ldflags
    tags:
      - full
  - id: plugin_yaml
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./plugin/yaml
    binary: plugins/yaml
    flags:
      - *trimpath_flag
    ldflags:
      - *strip_ldflags
    tags:
      - full
  - id: plugin_docker
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      # - windows
      # - darwin
    goarch:
      - amd64
      - arm64
    main: ./plugin/docker
    binary: plugins/docker
    flags:
      - *trimpath_flag
    ldflags:
      - *strip_ldflags
    tags:
      - full
  - id: plugin_kubernetes
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      # - windows
      # - darwin
    goarch:
      - amd64
      - arm64
    main: ./plugin/kubernetes
    binary: plugins/kubernetes
    flags:
      - *trimpath_flag
    ldflags:
      - *strip_ldflags
    tags:
      - full
  - id: plugin_fixed
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./plugin/fixed
    binary: plugins/fixed
    flags:
      - *trimpath_flag
    ldflags:
      - *strip_ldflags
    tags:
      - full
  - id: plugin_failtoban
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./plugin/failtoban
    binary: plugins/failtoban
    flags:
      - *trimpath_flag
    ldflags:
      - *strip_ldflags
    tags:
      - full
  - id: plugin_username_router
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./plugin/username-router
    binary: plugins/username-router
    flags:
      - *trimpath_flag
    ldflags:
      - *strip_ldflags
    tags:
      - full
  - id: plugin_lua
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./plugin/lua
    binary: plugins/lua
    flags:
      - *trimpath_flag
    ldflags:
      - *strip_ldflags
    tags:
      - full
  - id: plugin_metrics
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./plugin/metrics
    binary: plugins/metrics
    flags:
      - *trimpath_flag
    ldflags:
      - *strip_ldflags
    tags:
      - full
  - id: sshpiperd_webadmin
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./cmd/sshpiperd-webadmin
    binary: sshpiperd-webadmin
    flags:
      - *trimpath_flag
    ldflags:
      - *strip_ldflags
      - -X main.mainver={{.Version}}
    tags:
      - full

archives:
  - formats: ['tar.gz']
    allow_different_binary_count: true
    # this name template makes the OS and Arch compatible with the results of uname.
    name_template: >-
      sshpiperd_with_plugins_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    # use zip for windows archives
    format_overrides:
      - goos: windows
        formats: ['zip']
    ids:
      - sshpiperd
      - plugin_workingdir
      - plugin_yaml
      - plugin_fixed
      - plugin_failtoban
      - plugin_docker
      - plugin_kubernetes
      - plugin_username_router
      - plugin_lua
      - plugin_metrics
      - sshpiperd_webadmin
# Docker images are intentionally NOT built by GoReleaser. The Dockerfile is the
# single source of truth for the published images and is driven by the
# top-level Makefile (see `make docker-push`). This keeps GoReleaser focused on
# binary archives + Snap, and avoids shipping pre-built binaries into the image
# build context.
checksum:
  name_template: "checksums.txt"
snapshot:
  version_template: "{{ incpatch .Version }}"
release:
  draft: true
  replace_existing_draft: true
  disable: true

snapcrafts:
  - ids:
      - sshpiperd
      - snaplauncher
      - plugin_workingdir
      - plugin_yaml
      - plugin_fixed
      - plugin_failtoban
      - plugin_username_router
      - plugin_lua
    name: sshpiperd
    name_template: "sshpiperd_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    summary: The missing reverse proxy for ssh scp
    description: |
      sshpiperd is a reverse proxy for ssh/scp. It allows you to have a single
      ssh key pair for all your servers, behind a single IP address. It also
      allows you to connect to internal servers without exposing them to the
      internet.
    publish: true
    grade: stable
    confinement: strict
    license: MIT
    apps:
      sshpiperd:
        command: launcher
        plugs: [network-bind] 
        daemon: simple
    channel_templates:
      - beta
      - stable
    extra_files:
      - source: cmd/sshpiperd/snap/hooks/configure
        destination: meta/hooks/configure
        mode: 0755        
    hooks:
      configure:
        plugs: [home]
